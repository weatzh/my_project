name: Push 기반 CI/CD 테스트

# 트리거 지정, CI/CD가 작동하게 되는 원인, 이벤트등 정의
# main 브랜치에서 push 이벤트(리슨->on)가 발생되면 아래 설정한 내용되고 작동한다!!
on:
  push:
    branches: ["container"]
jobs:
  # app 관련 이미지 생성 허브에 푸시 (소스코드/리소스 모두 포함되어 있음)
  ci:
    runs-on:  ubuntu-latest
    steps:
      # 체크아웃, 소스코드를 ci서버에 다운
      - name: 코드 checkout
        uses: actions/checkout@v3

      # 도커허브 로그인 -> ID/PW
      - name: docker hub login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # fastapi app 에 대한 이미지 빌드 푸시 동시진행
      - name: build and push fastapi app
        uses: docker/build-push-action@v4
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fastapi-app:1.0
  
    # 사용자명/nginx-proxy:1.0 형태로 이미지 빌드 -> 푸시
      - name: build and push nginx proxy
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/nginx-proxy:1.0

 # EC2 docker-compose.yml, 설정파일등 copy, 도커컴포즈 작동
  cd:
    # ci 작업이 완료된후 진행
    needs: ci
    # cd 작업을 위한 서버 세팅
    runs-on: ubuntu-latest

    steps:
      #1. 소스코드 체크아웃
      - name: 코드 Checkout
        uses: actions/checkout@v3

        #2. 카피 docker-compose.yml
      - name: docker-compose.yml to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          source: ./docker-compose.yml
          target: "/home/ubuntu"

      - name: Run Script and Service Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
           # 작업 디렉토리 이동(docker-compose.yml 존재하는 위치)

            cd /home/ubuntu
           # 필요시 .env 생성 -> 시크릿 변수 읽어서 파일 처리 (여기서는 생략)
           # 최신 이미지 가져오기
            docker compose pull
            # 컨테이너 구성 -> 신규 혹은 교체 등
            docker compose up -d
            # 이미지가 최신으로 교체되면 기존것 가비지가 되서 공간만 차지함
            docker image prune -f